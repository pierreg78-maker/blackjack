<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackjack - Atelier Mémo</title>
<link rel="stylesheet" href="./style.css?v=20260721-1">
</head>
<body>

<div id="game">

    <header class="gameHeader">
        <h1>❦ Blackjack ❦</h1>
        <div class="titleDivider" aria-hidden="true"><span></span></div>
    </header>

    <div class="topBar">
        <div class="playerInfo">
            <div class="playerName">
                👤 <span id="playerName">Profil non sélectionné</span>
            </div>

            <div class="infoBox">
                🪙 Pièces d'or :
                <span id="gold">—</span>
            </div>
        </div>

        <div class="betBox">
            <span class="betLabel">Mise :</span>

            <div class="betChoices">
                <button class="betButton active" data-bet="10">10</button>
                <button class="betButton" data-bet="20">20</button>
                <button class="betButton" data-bet="50">50</button>
            </div>
        </div>
    </div>

    <!-- Animation visuelle de la mise pendant la synchronisation -->
    <div id="betStage" class="betStage" aria-hidden="true">
        <div id="betPot" class="betPot"></div>
        <div class="betStageLabel">Mise en jeu…</div>
    </div>

    <main class="tableArea">
        <section class="zone dealerZone">
            <h2>Croupier</h2>

            <div class="playRow">
                <div class="cards" id="dealerCards"></div>

                <div class="scoreBox">
                    Total<br>
                    <span id="dealerScore">18</span>
                </div>
            </div>
        </section>

        <div class="tableDivider" aria-hidden="true"><span></span></div>

        <section class="zone playerZone">
            <h2>Vous</h2>

            <div class="playRow">
                <div class="cards" id="playerCards"></div>

                <div class="scoreBox">
                    Total<br>
                    <span id="playerScore">0</span>
                </div>
            </div>
        </section>
    </main>

    <div id="syncStatus" class="syncStatus" aria-live="polite"></div>

    <div id="message" class="message" aria-live="polite">
        Chargement du profil…
    </div>

    <div class="buttons">
        <button id="dealBtn">Distribuer</button>
        <button id="hitBtn" disabled>Tirer</button>
        <button id="standBtn" disabled>Rester</button>
        <button id="newBtn">Nouvelle partie</button>
    </div>

    <footer class="gameFooter">
        <a class="villageButton" href="../village/" aria-label="Retour au village">
            <span class="villageIcon" aria-hidden="true">⌂</span>
        </a>
        <span class="villageText">Retour au village</span>
    </footer>

</div>

<script src="./coin-animation.js?v=20260719-2"></script>
<script src="./script.js?v=20260719-2"></script>
</body>
</html>
