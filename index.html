<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blackjack - Atelier Mémo</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="game">

       <h1>🃏 Blackjack</h1>

    <div class="topBar">

        <div class="infoBox">
            🪙 Pièces d'or :
            <span id="gold">100</span>
        </div>

        <div class="betBox">
    <span class="betLabel">Mise :</span>

    <div class="betChoices">
        <button class="betButton active" data-bet="10">10</button>
        <button class="betButton" data-bet="20">20</button>
        <button class="betButton" data-bet="50">50</button>
    </div>
</div>

    </div>

    <!-- ==================== -->
    <!-- CROUPIER -->
    <!-- ==================== -->

    <div class="zone">

        <h2>Croupier</h2>

        <div class="playRow">

    <div class="cards" id="dealerCards"></div>

   <div class="scoreBox">
    Total<br>
    <span id="dealerScore">18</span>
</div>

</div>
    </div>

    <!-- ==================== -->
    <!-- JOUEUR -->
    <!-- ==================== -->

    <!-- JOUEUR -->
<div class="zone">
    <h2>Vous</h2>

    <div class="playRow">
        <div class="cards" id="playerCards"></div>

        <div class="scoreBox">
            Total<br>
            <span id="playerScore">0</span>
        </div>
    </div>
</div>

    <!-- ==================== -->

    <div id="message" class="message">
        Cliquez sur « Distribuer »
    </div>

    <!-- ==================== -->

    <div class="buttons">

        <button id="dealBtn">
            Distribuer
        </button>

        <button id="hitBtn" disabled>
            Tirer
        </button>

        <button id="standBtn" disabled>
            Rester
        </button>

        <button id="newBtn">
            Nouvelle partie
        </button>

    </div>

 

    <script src="./script.js"></script>
</body>

</html>
