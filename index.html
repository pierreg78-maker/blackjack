<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blackjack - Atelier Mémo</title>

<link rel="stylesheet" href="./style.css?v=20260719-2">

</head>

<body>

<div id="game">

    <a class="villageButton"
       href="https://pierreg78-maker.github.io/village/"
       aria-label="Retour au village">
        <span>Retour<br>au<br>Village</span>
    </a>

      <h1>❦ Blackjack ❦</h1>
    <div class="topBar">

        <div class="playerInfo">
            <div class="playerName">
                👤 <span id="playerName">Profil non sélectionné</span>
            </div>

            <div class="infoBox">
                🪙 Pièces d'or :
                <span id="gold">—</span>
            </div>
        </div>

        <div class="betBox">
    <span class="betLabel">Mise :</span>

    <div class="betChoices">
        <button class="betButton active" data-bet="10">10</button>
        <button class="betButton" data-bet="20">20</button>
        <button class="betButton" data-bet="50">50</button>
    </div>
</div>

    </div>

   

    <!-- Animation visuelle de la mise pendant la synchronisation -->
    <div id="betStage" class="betStage" aria-hidden="true">
        <div id="betPot" class="betPot">
            <div id="betCoin" class="betCoin">
                <div class="betCoinSpinner">
                    <img class="betCoinFace" src="https://raw.githubusercontent.com/pierreg78-maker/AtelierMemo-Assets/refs/heads/main/assets/coins/piece-or-avers.png" alt="Pièce d'or">
                    <img class="betCoinFace betCoinRevers" src="https://raw.githubusercontent.com/pierreg78-maker/AtelierMemo-Assets/refs/heads/main/assets/coins/piece-or-revers.png" alt="Revers">
                </div>
            </div>
            <div class="betStageLabel">Mise en jeu…</div>
        </div>
    </div>

     <!-- ==================== -->
    <!-- CROUPIER -->
    <!-- ==================== -->

    <div class="zone">

        <h2>Croupier</h2>

        <div class="playRow">

    <div class="cards" id="dealerCards"></div>

   <div class="scoreBox">
    Total<br>
    <span id="dealerScore">18</span>
</div>

</div>
    </div>

    <!-- ==================== -->
    <!-- JOUEUR -->
    <!-- ==================== -->

    <!-- JOUEUR -->
<div class="zone">
    <h2>Vous</h2>

    <div class="playRow">
        <div class="cards" id="playerCards"></div>

        <div class="scoreBox">
            Total<br>
            <span id="playerScore">0</span>
        </div>
    </div>
</div>

    <!-- ==================== -->

    <div id="syncStatus" class="syncStatus" aria-live="polite"></div>

    <div id="message" class="message" aria-live="polite">
        Chargement du profil…
    </div>

    <!-- ==================== -->

    <div class="buttons">

        <button id="dealBtn">
            Distribuer
        </button>

        <button id="hitBtn" disabled>
            Tirer
        </button>

        <button id="standBtn" disabled>
            Rester
        </button>

        <button id="newBtn">
            Nouvelle partie
        </button>

    </div>

</div>

<script src="./coin-animation.js?v=20260719-2"></script>
<script src="./script.js?v=20260719-2"></script>
</body>

</html>
